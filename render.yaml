databases:
  - name: resume-db
    plan: free
    region: ohio

services:
  - type: web
    name: smart-resume-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: resume-db
          property: connectionString

      - key: GOOGLE_API_KEY
        sync: false